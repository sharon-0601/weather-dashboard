<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; text-align: center; }
        h1 { color: #333; }
        table { margin: 0 auto; border-collapse: collapse; width: 80%; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        th, td { padding: 12px; border: 1px solid #ddd; }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        #last-updated { margin-top: 10px; font-style: italic; color: #555; }
        canvas { margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Weather Dashboard</h1>

    <div id="weather-table">
        <table>
            <tr>
                <th>City</th>
                <th>Temperature (°C)</th>
                <th>Description</th>
            </tr>
        </table>
    </div>

    <p id="last-updated">Last updated: <span id="time"></span></p>

    <canvas id="weatherChart" width="800" height="400"></canvas>

    <script>
        const table = document.querySelector("#weather-table table");

        function updateTime() {
            document.getElementById("time").innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        let chart;

        function tempColor(temp) {
            // Color scale: cold (blue) to hot (red)
            if (temp === "N/A") return 'gray';
            if (temp <= 0) return '#3498db';        // blue
            if (temp <= 10) return '#5dade2';       // light blue
            if (temp <= 20) return '#f1c40f';       // yellow
            if (temp <= 30) return '#e67e22';       // orange
            return '#e74c3c';                       // red
        }

        async function fetchWeather() {
            const response = await fetch('/weather_data');
            const data = await response.json();

            // Update table
            table.innerHTML = `
                <tr>
                    <th>City</th>
                    <th>Temperature (°C)</th>
                    <th>Description</th>
                </tr>
            `;
            data.forEach(item => {
                const row = table.insertRow();
                row.insertCell(0).innerText = item.city;

                const tempCell = row.insertCell(1);
                tempCell.innerText = item.temperature;
                tempCell.style.color = tempColor(item.temperature);

                const descCell = row.insertCell(2);
                descCell.innerText = item.description;
            });

            // Update chart
            const labels = data.map(d => d.city);
            const temps = data.map(d => d.temperature === "N/A" ? 0 : d.temperature);
            const colors = data.map(d => tempColor(d.temperature));

            if (!chart) {
                const ctx = document.getElementById('weatherChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Temperature (°C)',
                            data: temps,
                            backgroundColor: colors
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            } else {
                chart.data.datasets[0].data = temps;
                chart.data.datasets[0].backgroundColor = colors;
                chart.update();
            }
        }

        fetchWeather(); // initial load
        setInterval(fetchWeather, 10000); // update every 10 seconds
    </script>
</body>
</html>
